# Production-ready Cloud Build pipeline for Next.js 16 (Node.js 20)
# Deploys to Google Cloud Run in asia-south1 (Mumbai) using Artifact Registry.

steps:
  # STEP 1: Build the optimized multi-stage Docker image.
  # We pass all NEXT_PUBLIC_FIREBASE_* build-time arguments so Next.js can static-inline them.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Docker Image'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${COMMIT_SHA}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID=${_NEXT_PUBLIC_FIREBASE_APP_ID}'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${_NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID}'
      - '.'

  # STEP 2: Push the built Docker image to Google Cloud Artifact Registry.
  # Artifact Registry is the modern replacement for the deprecated Container Registry (gcr.io).
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push to Artifact Registry'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${COMMIT_SHA}'

  # STEP 3: Deploy the container image to Google Cloud Run.
  # Configured to allow unauthenticated public access, deploy to asia-south1, and run on managed infrastructure.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy to Cloud Run'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${COMMIT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

# Images produced by this build pipeline to be tracked by Cloud Build.
images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${COMMIT_SHA}'

# Substituted parameters. You should override these when setting up your Cloud Build Trigger
# in the Google Cloud Console to inject your actual production credentials.
substitutions:
  _REGION: 'asia-south1'
  _REPOSITORY: 'website-leads-mac24'
  _SERVICE_NAME: 'website-leads-mac24'
  _NEXT_PUBLIC_FIREBASE_API_KEY: 'your-api-key-here'
  _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: 'mac24-leads.firebaseapp.com'
  _NEXT_PUBLIC_FIREBASE_PROJECT_ID: 'mac24-leads'
  _NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: 'mac24-leads.firebasestorage.app'
  _NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '936883009556'
  _NEXT_PUBLIC_FIREBASE_APP_ID: 'your-firebase-app-id'
  _NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: 'your-measurement-id-optional'

# Use Cloud Logging only (recommended for clean logging configuration in modern GCP environments)
options:
  logging: CLOUD_LOGGING_ONLY
